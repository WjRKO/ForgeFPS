# ============================================================
#  FrameForge - GitHub Actions: build .exe (SENZA firma SignPath)
#  Usa questo file finché SignPath non è approvato/configurato.
#
#  COPIA in: .github/workflows/build.yml  (sostituendo build-sign.yml)
#
#  Trigger: push di un tag "v*" -> build + release automatica con SHA256.
# ============================================================
name: build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyInstaller
        run: python -m pip install --upgrade pip pyinstaller

      - name: Build .exe (metadati + no UPX)
        working-directory: agent-build
        run: >
          pyinstaller --onefile --name forgefps-agent --console --noupx --clean
          --version-file version_info.txt forgefps_agent.py

      - name: Compute SHA256
        shell: pwsh
        working-directory: agent-build
        run: |
          $h = (Get-FileHash dist/forgefps-agent.exe -Algorithm SHA256).Hash.ToLower()
          echo "SHA256 = $h"
          echo "## forgefps-agent.exe" >> $env:GITHUB_STEP_SUMMARY
          echo "" >> $env:GITHUB_STEP_SUMMARY
          echo "**SHA256:** ``$h``" >> $env:GITHUB_STEP_SUMMARY
          echo "SHA256=$h" >> $env:GITHUB_OUTPUT
        id: hash

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: agent-build/dist/forgefps-agent.exe
          generate_release_notes: true
          body: |
            **SHA256:** `${{ steps.hash.outputs.SHA256 }}`

            > Build non firmata (SignPath in attesa di approvazione). Verifica sempre lo SHA256 prima di eseguire.
