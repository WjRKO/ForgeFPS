# ============================================================
#  FrameForge - GitHub Actions: build cartella + ZIP (SENZA firma SignPath)
#  Da v0.6.7: --onedir per evitare falsi positivi Windows Defender.
#
#  COPIA in: .github/workflows/build.yml  (sostituendo build-sign.yml)
#
#  Trigger: push di un tag "v*" -> build + release automatica con SHA256 sul ZIP.
# ============================================================
name: build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyInstaller
        run: python -m pip install --upgrade pip pyinstaller

      - name: Build onedir (metadati + no UPX + UAC admin)
        working-directory: agent-build
        run: >
          pyinstaller --onedir --name forgefps-agent --console --noupx --clean
          --uac-admin
          --version-file version_info.txt forgefps_agent.py

      - name: Zip forgefps-agent folder
        shell: pwsh
        working-directory: agent-build
        run: Compress-Archive -Path 'dist/forgefps-agent' -DestinationPath 'dist/forgefps-agent.zip' -Force

      - name: Compute SHA256 (ZIP)
        shell: pwsh
        working-directory: agent-build
        run: |
          $h = (Get-FileHash dist/forgefps-agent.zip -Algorithm SHA256).Hash.ToLower()
          echo "SHA256 = $h"
          echo "## forgefps-agent.zip" >> $env:GITHUB_STEP_SUMMARY
          echo "" >> $env:GITHUB_STEP_SUMMARY
          echo "**SHA256:** ``$h``" >> $env:GITHUB_STEP_SUMMARY
          echo "SHA256=$h" >> $env:GITHUB_OUTPUT
        id: hash

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: agent-build/dist/forgefps-agent.zip
          generate_release_notes: true
          body: |
            **SHA256 (ZIP):** `${{ steps.hash.outputs.SHA256 }}`

            Build --onedir (cartella + DLL) invece di --onefile per evitare i falsi positivi euristici
            di Windows Defender sul bootloader PyInstaller. Uso: unzip -> apri `forgefps-agent/` ->
            `forgefps-agent.exe --token IL_TUO_TOKEN`.

            > Build non firmata (SignPath in attesa di approvazione). Verifica sempre lo SHA256 prima di eseguire.
